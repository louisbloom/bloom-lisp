name: Windows

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: x86_64
            runner: windows-latest
            msystem: UCRT64
            arch: ucrt-x86_64
          - label: aarch64
            runner: windows-11-arm
            msystem: CLANGARM64
            arch: clang-aarch64
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout ditty
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout boba (dependency)
        uses: actions/checkout@v5
        with:
          repository: chestso/boba
          path: boba
          fetch-depth: 0

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            base-devel
            git
            mingw-w64-${{ matrix.arch }}-toolchain
            autoconf
            automake
            libtool
            make
            pkg-config
            mingw-w64-${{ matrix.arch }}-gc
            mingw-w64-${{ matrix.arch }}-pcre2
            zip
            p7zip

      - name: Build & install boba
        working-directory: boba
        run: |
          ./autogen.sh
          mkdir build && cd build
          sh ../configure --prefix="$MINGW_PREFIX"
          make -j"$(nproc)"
          make check
          make install

      - name: Build ditty
        run: |
          ./autogen.sh
          mkdir build && cd build
          if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
            sh ../configure --enable-release
          else
            sh ../configure
          fi
          make -j"$(nproc)"

      - name: Run tests
        run: make -C build check

      - name: Build portable ZIP
        run: make -C build dist-portable

      - name: Upload build artifact
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v5
        with:
          name: ditty-windows-${{ matrix.label }}
          path: ditty-*-windows-*.zip
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ditty-*-windows-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
